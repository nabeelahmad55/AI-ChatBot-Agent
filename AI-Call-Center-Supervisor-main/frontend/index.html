<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quartz AI Support Chat</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Floating Chat Toggle Button -->
    <button id="chatToggle" type="button" aria-label="Open support chat">💬</button>

    <!-- Chat Widget -->
    <div id="chatWidget" class="d-flex flex-column">
      <div id="chatHeader">
        <h5>Support Chat</h5>
        <button id="closeChat" type="button" aria-label="Close chat">&times;</button>
      </div>

      <div id="chatBody">

  <div id="chatContainer" class="d-none flex-column">
    <div id="chatBox" aria-live="polite"></div>
    <div id="chatInputArea">
      <div id="inputContainer">
        <textarea
          type="text"
          id="userInput"
          class="form-control"
          placeholder="Type message..."
          aria-label="Type your message"
          rows="1"
        ></textarea>
      </div>
      <button id="sendBtn" class="btn btn-success" aria-label="Send message">Send</button>
    </div>
  </div>
</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
